---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      initContainers:
        - name: wait-for-collector
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z otel-collector 4318; do echo waiting for otel-collector; sleep 2; done;']
        - name: wait-for-jaeger
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z jaeger 4318; do echo waiting for jaeger; sleep 2; done;']
      containers:
        - name: service-a
          image: service-a:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: SERVICE_B_URL
              value: "http://service-b:8080"
            - name: OTEL_SERVICE_NAME
              value: "service-a"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: service-a
  namespace: observability
spec:
  selector:
    app: service-a
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
